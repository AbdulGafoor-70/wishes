/* ADD SUN CODE HERE */

function updateSun(){

    const now = new Date();

    const hour =
        now.getHours() +
        now.getMinutes()/60;

    const currentSeconds =
        now.getHours()*3600 +
        now.getMinutes()*60 +
        now.getSeconds();

    const sunrise = 5.5 * 3600;
    const sunset  = 18.5 * 3600;

    let progress =
        (currentSeconds - sunrise) /
        (sunset - sunrise);

    progress =
        Math.max(0, Math.min(progress,1));

const x =
    60 +
    progress *
    (window.innerWidth - 180);

const y =
    window.innerHeight * 0.50 -
    Math.sin(progress * Math.PI) *
    (window.innerHeight * 0.45);
    
    sun.style.left = x + "px";
    sun.style.top = y + "px";

    /* SUN COLORS */

    if(hour >= 5 && hour < 8)
    {
        sun.style.background =
        "radial-gradient(circle,#FFF3E0,#FFB74D)";

        sun.style.boxShadow =
        "0 0 60px #FFB74D";
    }

    else if(hour >= 8 && hour < 11)
    {
        sun.style.background =
        "radial-gradient(circle,#FFF8E1,#FFD54F)";

        sun.style.boxShadow =
        "0 0 90px #FFD54F";
    }

    else if(hour >= 11 && hour < 14)
    {
        sun.style.background =
        "radial-gradient(circle,#FFFFFF,#FFEB3B)";

        sun.style.boxShadow =
        "0 0 150px #FFEB3B";
    }

    else if(hour >= 14 && hour < 16)
    {
        sun.style.background =
        "radial-gradient(circle,#FFF8E1,#FFD54F)";

        sun.style.boxShadow =
        "0 0 90px #FFD54F";
    }

    else if(hour >= 16 && hour <= 18.5)
    {
        sun.style.background =
        "radial-gradient(circle,#FFD54F,#FF6F00)";

        sun.style.boxShadow =
        "0 0 80px #FF5722";
    }

    /* SHOW/HIDE SUN */

    if(currentSeconds < sunrise ||
       currentSeconds > sunset)
    {
        sun.style.display = "none";

        moon.style.display = "block";
    }
    else
    {
        sun.style.display = "block";

        moon.style.display = "none";
    }
}

function updateMoon(){

    const now = new Date();

    const hour =
        now.getHours() +
        now.getMinutes()/60;

    const currentSeconds =
        now.getHours()*3600 +
        now.getMinutes()*60 +
        now.getSeconds();

    const moonrise = 18.5 * 3600; // 6:30 PM
    const moonset  = 29.5 * 3600; // 5:30 AM next day

    let adjustedSeconds =
    currentSeconds;

    if(currentSeconds < 5.5 * 3600)
    {
        adjustedSeconds += 24 * 3600;
    }

    let progress =
        (adjustedSeconds - moonrise) /
        (moonset - moonrise);

    progress =
        Math.max(0,Math.min(progress,1));

    const x =
        window.innerWidth -
        (progress * window.innerWidth);

    const y =
        window.innerHeight * 0.55 -
        Math.sin(progress * Math.PI) * 400;

    moon.style.left = x + "px";
    moon.style.top = y + "px";

    let moonColor;

    if(hour >= 18 && hour < 20.5)
    {
        moonColor = "#FFD27F";
    }
    else if(hour >= 20.5 && hour < 23)
    {
        moonColor = "#FFF4C2";
    }
    else if(hour >= 23 || hour < 3)
    {
        moonColor = "#FFFFFF";
    }
    else
    {
        moonColor = "#FFD27F";
    }

    moon.style.background =
    `radial-gradient(
        circle,
        #FFFFFF,
        ${moonColor}
    )`;

    moon.style.boxShadow =
    `0 0 40px ${moonColor}`;
}

function updateClouds(){

    const hour =
        new Date().getHours() +
        new Date().getMinutes()/60;

    const clouds = [
        cloud1,
        cloud2,
        cloud3,
        cloud4,
        cloud5,
        cloud6
    ];

    /* Morning */
    if(hour >= 5.5 && hour < 10)
    {
        clouds.forEach(cloud => {

            cloud.style.setProperty(
                "--cloud-color",
                "#FFF8E1"
            );

            cloud.style.opacity = "0.9";
        });

        cloud1.style.display = "block";
        cloud2.style.display = "block";
        cloud3.style.display = "block";
        cloud4.style.display = "block";
        cloud5.style.display = "none";
        cloud6.style.display = "none";
    }

    /* Day */
    else if(hour >= 10 && hour < 17)
    {
        clouds.forEach(cloud => {

            cloud.style.setProperty(
                "--cloud-color",
                "#FFFFFF"
            );

            cloud.style.opacity = "0.9";
        });

        cloud1.style.display = "block";
        cloud2.style.display = "block";
        cloud3.style.display = "block";
        cloud4.style.display = "block";
        cloud5.style.display = "block";
        cloud6.style.display = "block";
    }

    /* Sunset */
    else if(hour >= 17 && hour < 18.5)
    {
        clouds.forEach(cloud => {

            cloud.style.setProperty(
                "--cloud-color",
                "#FFCC80"
            );

            cloud.style.opacity = "0.8";
        });

        cloud1.style.display = "block";
        cloud2.style.display = "block";
        cloud3.style.display = "block";
        cloud4.style.display = "none";
        cloud5.style.display = "none";
        cloud6.style.display = "none";
    }

    /* Night */
    else
    {
        clouds.forEach(cloud => {

            cloud.style.setProperty(
                "--cloud-color",
                "#B0BEC5"
            );

            cloud.style.opacity = "0.4";
        });

        cloud1.style.display = "block";
        cloud2.style.display = "block";
        cloud3.style.display = "none";
        cloud4.style.display = "none";
        cloud5.style.display = "none";
        cloud6.style.display = "none";
    }

}

let fireflyAngle = 0;

function moveFireflies(){

    fireflyAngle += 0.05;

    const f1 =
    document.getElementById("firefly1");

    const f2 =
    document.getElementById("firefly2");

    const f3 =
    document.getElementById("firefly3");

    const f4 =
    document.getElementById("firefly4");

    const f5 =
    document.getElementById("firefly5");

    f1.style.left =
    (35 + Math.sin(fireflyAngle) * 3) + "vw";

    f2.style.left =
    (37 + Math.cos(fireflyAngle) * 3) + "vw";

    f3.style.left =
    (39 + Math.sin(fireflyAngle + 1) * 3) + "vw";

    f4.style.left =
    (36 + Math.cos(fireflyAngle + 2) * 3) + "vw";

    f5.style.left =
    (38 + Math.sin(fireflyAngle + 3) * 3) + "vw";
}

setInterval(
    moveFireflies,
    50
);
